services:
  postgres:
    image: postgres:16
    container_name: chatweb-postgres
    environment:
      POSTGRES_DB: chatdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    volumes:
      - postgres_data: /var/lib/postgresql/data
  
  redis:
    image: redis:7-alpine
    container_name: chatweb-redis
  
  backend:
    build: ./chat-web
    container_name: chatweb-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/chatdb
      SPRING_DATASROUCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: your-super-secret-key-must-be-at-least-32-characters-long!
      JWT_EXPIRATION: 86400000
    depends_on:
      - postgres
      - redis
  
  frontend:
  build: ./chat-frontend
  container_name: chatweb-frontend
  ports:
    - "80:80"
  depends_on:
    - backend

volumes:
  postgres_data: